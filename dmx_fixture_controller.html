<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DMX Fixture Controller Prototype</title>
<style>
:root{color-scheme:dark;--bg:#0d1115;--panel:#161c22;--line:#31404d;--text:#edf3f7;--muted:#9cafbf;--accent:#37c4a4;--warn:#ffbc6b;--bad:#ff7a7a}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,sans-serif}
main{max-width:1260px;margin:0 auto;padding:20px;display:grid;gap:16px}
header{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
h1{font-size:22px;margin:0}h2{font-size:18px;margin:0}h3{font-size:15px;margin:0}
.status,.small{color:var(--muted);font-size:13px}.bad{color:var(--bad)}
.panel,.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;display:grid;gap:12px}
.toolbar,.buttons,.row{display:flex;gap:10px;align-items:end;flex-wrap:wrap}
.columns{display:grid;grid-template-columns:1fr 1fr;gap:16px}.surface{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:14px}
label{display:grid;gap:6px;color:var(--muted);font-size:13px}
input,button,select,textarea{font:inherit}
input,select,textarea{padding:10px;background:#0a0d10;color:var(--text);border:1px solid var(--line);border-radius:6px}
input[type=number]{width:96px}input[type=text]{min-width:160px}input[type=url]{min-width:260px}textarea{min-height:70px;min-width:260px}
input[type=range]{width:100%;accent-color:var(--accent)}
button{border:1px solid var(--line);background:#22303a;color:var(--text);padding:10px 14px;border-radius:6px;cursor:pointer}
button.primary{background:var(--accent);border-color:var(--accent);color:#06110e;font-weight:700}button.warn{background:#3c2b1b;border-color:#765332;color:var(--warn)}
button:disabled{opacity:.45;cursor:not-allowed}
.list{display:grid;gap:8px}.item{border:1px solid var(--line);border-radius:8px;padding:10px;background:#10161b;display:grid;gap:8px}
.item.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.control{border-top:1px solid var(--line);padding-top:12px;display:grid;gap:8px}
.control-head{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
.readout{font-size:26px;line-height:1;color:var(--accent);font-weight:700}.bytes{color:var(--muted);font-size:13px}
.byte-sliders{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.xy-pad{position:relative;aspect-ratio:1.55/1;border:1px solid var(--line);border-radius:8px;background:linear-gradient(#22303a 1px,transparent 1px),linear-gradient(90deg,#22303a 1px,transparent 1px),#0a0d10;background-size:25% 25%;touch-action:none;cursor:crosshair}
.xy-dot{position:absolute;width:16px;height:16px;border-radius:50%;background:var(--accent);border:2px solid #06110e;box-shadow:0 0 0 1px var(--accent);transform:translate(-50%,-50%);pointer-events:none}
.swatches{display:flex;gap:8px;flex-wrap:wrap}.swatch{min-width:42px;height:34px;padding:0;border-radius:6px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab.active{border-color:var(--accent)}
.wheel-editor{border:1px solid var(--line);border-radius:8px;padding:12px;background:#10161b;display:grid;gap:10px}.gobo-canvas{width:120px;height:120px;border:1px solid var(--line);border-radius:8px;background:#000;touch-action:none;cursor:crosshair}.option-icon{display:inline-block;width:22px;height:22px;border-radius:4px;border:1px solid var(--line);vertical-align:middle;background-size:cover;background-position:center;margin-right:6px}
@media(max-width:900px){main{padding:12px}.columns{grid-template-columns:1fr}.surface{grid-template-columns:1fr}input[type=url],input[type=text],textarea{min-width:0;width:100%}}
</style>
</head>
<body>
<main>
<header>
<div>
<h1>DMX Fixture Controller</h1>
<div class="status" id="status">Ready</div>
</div>
<div class="toolbar">
<label>Pico base URL<input id="baseUrl" type="url" placeholder="http://192.168.1.50"></label>
<label><input id="live" type="checkbox" checked> Live send</label>
<button id="save">Save setup</button>
<button id="load">Load setup</button>
<a href="dmx_motion.html" style="border:1px solid var(--line);background:#22303a;color:var(--text);padding:10px 14px;border-radius:6px;cursor:pointer;text-decoration:none;font:inherit">Motion FX →</a>
<a href="dmx_chaser.html" style="border:1px solid var(--line);background:#22303a;color:var(--text);padding:10px 14px;border-radius:6px;cursor:pointer;text-decoration:none;font:inherit">Chaser →</a>
<a href="dmx_benchmark.html" style="border:1px solid var(--line);background:#22303a;color:var(--text);padding:10px 14px;border-radius:6px;cursor:pointer;text-decoration:none;font:inherit">FPS Test</a>
<a href="dmx_fan.html" style="border:1px solid var(--line);background:#22303a;color:var(--text);padding:10px 14px;border-radius:6px;cursor:pointer;text-decoration:none;font:inherit">Fan Out →</a>
<button id="exportCsv">Export CSV</button>
<button id="exportJson">Export JSON</button>
<button id="importJson">Import JSON</button>
<input id="importJsonFile" type="file" accept=".json,application/json" style="display:none">
</div>
</header>

<section class="columns">
<div class="panel">
<h2>Fixture Profiles</h2>
<div class="toolbar">
<label>Name<input id="profileName" type="text" value="Moving Head 16ch"></label>
<label>Mode<input id="profileMode" type="text" value="16ch"></label>
<label>Channels<input id="profileChannels" type="number" min="1" max="512" value="16"></label>
<button class="primary" id="addProfile">Add profile</button>
<button id="saveProfile">Save profile</button>
</div>
<div class="list" id="profiles"></div>
</div>

<div class="panel">
<h2>Add Control To Selected Profile</h2>
<div class="toolbar">
<label>Type
<select id="controlType">
<option value="panTilt16">Pan/Tilt 16-bit XY</option>
<option value="panTilt8">Pan/Tilt 8-bit XY</option>
<option value="slider8">8-bit slider</option>
<option value="slider16">16-bit slider</option>
<option value="rgb">RGB color</option>
<option value="rgbw">RGBW color</option>
<option value="rgbwa">RGBWA color</option>
<option value="cmy">CMY color</option>
<option value="cmyk">CMYK color</option>
<option value="wheel">Wheel / indexed values</option>
</select>
</label>
<label>Label<input id="controlLabel" type="text" value="Dimmer"></label>
<label id="controlAWrap"><span id="controlALabel">Ch A</span><input id="controlA" type="number" min="1" max="512" value="1"></label>
<label id="controlBWrap"><span id="controlBLabel">Ch B</span><input id="controlB" type="number" min="1" max="512" value="3"></label>
<label id="controlCWrap"><span id="controlCLabel">Ch C</span><input id="controlC" type="number" min="1" max="512" value="0"></label>
<label id="controlDWrap"><span id="controlDLabel">Ch D</span><input id="controlD" type="number" min="1" max="512" value="0"></label>
<label id="controlEWrap"><span id="controlELabel">Ch E</span><input id="controlE" type="number" min="1" max="512" value="0"></label>
<button class="primary" id="addControl">Add control</button>
<button id="cancelEdit">Cancel edit</button>
</div>
<div id="wheelEditorWrap">
<label>Wheel options, one per line: name=value
<textarea id="wheelOptions">Open=0
Red=16
Green=32
Blue=48</textarea>
</label>
<div class="wheel-editor">
<div class="toolbar">
<label>Option name<input id="wheelName" type="text" value="Open"></label>
<label>DMX value<input id="wheelValue" type="number" min="0" max="255" value="0"></label>
<label>Color<input id="wheelColor" type="color" value="#ffffff"></label>
<label>Upload image<input id="wheelImage" type="file" accept="image/*"></label>
</div>
<div class="toolbar">
<canvas id="goboCanvas" class="gobo-canvas" width="120" height="120"></canvas>
<div class="buttons"><button id="clearGobo" type="button">Clear drawing</button><button id="addWheelOption" type="button">Add wheel option</button></div>
</div>
<div class="small">Wheel option format: Name=value|#color or Name=value|image-data. Uploaded images and drawings are saved inside the setup JSON.</div>
</div>
</div>
<div class="small" id="controlHint"></div>
</div>
</section>

<section class="panel">
<h2>Patch Fixtures</h2>
<div class="toolbar">
<label>Name<input id="fixtureName" type="text" value="Spot 1"></label>
<label>Profile<select id="patchProfile"></select></label>
<label>Start address<input id="fixtureStart" type="number" min="1" max="512" value="1"></label>
<button id="nextFreeAddr">Next free</button>
<button class="primary" id="patchFixture">Patch fixture</button>
</div>
<div class="list" id="patched"></div>
</section>

<section class="panel">
<h2>Control Surface</h2>
<div class="surface" id="surface"></div>
</section>
</main>

<script>
const maxDmx=512;
let profiles=[];
let fixtures=[];
let activeProfileId=0;
let editingControlId=0;
const values={};
const baseUrl=document.getElementById('baseUrl');
// Persist Pico base URL across all pages
(()=>{ const v=localStorage.getItem('dmxPicoBaseUrl'); if(v) baseUrl.value=v; })();
baseUrl.addEventListener('input',()=>localStorage.setItem('dmxPicoBaseUrl',baseUrl.value));
const live=document.getElementById('live');
const statusEl=document.getElementById('status');
const profilesEl=document.getElementById('profiles');
const patchProfile=document.getElementById('patchProfile');
const patchedEl=document.getElementById('patched');
const surfaceEl=document.getElementById('surface');

function clamp(v,min,max){v=parseInt(v||0,10);return Math.max(min,Math.min(max,isNaN(v)?min:v));}
function uid(){return Date.now()+Math.floor(Math.random()*1000);}
function setStatus(text,bad=false){statusEl.textContent=text;statusEl.className=bad?'status bad':'status';}
function showError(text){setStatus(text,true);alert(text);}
function bytes16(v){v=clamp(v,0,65535);return {coarse:(v>>8)&255,fine:v&255};}
function hex2(n){return clamp(n,0,255).toString(16).padStart(2,'0');}
function rgbHex(v){return '#'+hex2(v.a)+hex2(v.b)+hex2(v.c);}
function cmyHex(v){return '#'+hex2(255-v.a)+hex2(255-v.b)+hex2(255-v.c);}
function cmykHex(v){
  return '#'+hex2(Math.round(255*(1-v.a/255)*(1-v.k/255)))+hex2(Math.round(255*(1-v.b/255)*(1-v.k/255)))+hex2(Math.round(255*(1-v.c/255)*(1-v.k/255)));
}
function hexToRgb(hex){
  const m=(hex||'#000000').match(/^#?([0-9a-f]{6})$/i);
  const n=parseInt(m?m[1]:'000000',16);
  return {a:(n>>16)&255,b:(n>>8)&255,c:n&255};
}
function rgbToCmy(hex){
  const rgb=hexToRgb(hex);
  return {a:255-rgb.a,b:255-rgb.b,c:255-rgb.c};
}
function rgbToCmyk(hex){
  const rgb=hexToRgb(hex);
  const r=rgb.a/255,g=rgb.b/255,b=rgb.c/255;
  const k=1-Math.max(r,g,b);
  if(k>=1)return {a:0,b:0,c:0,k:255};
  return {a:Math.round((1-r-k)/(1-k)*255),b:Math.round((1-g-k)/(1-k)*255),c:Math.round((1-b-k)/(1-k)*255),k:Math.round(k*255)};
}
function absolute(start,rel){return start+rel-1;}
function endpoint(){return baseUrl.value.replace(/\/+$/,'');}
function controlKey(f,c){return f.id+':'+c.id;}
function getValue(f,c,def=0){const key=controlKey(f,c);if(values[key]===undefined)values[key]=def;return values[key];}
function setValue(f,c,v){values[controlKey(f,c)]=v;}
function fixtureProfile(f){return profiles.find(p=>p.id===f.profileId);}
function activeProfile(){return profiles.find(profile=>profile.id===activeProfileId);}
function channelOk(f,rel,width=1){const ch=absolute(f.start,rel);return ch>=1&&(ch+width-1)<=maxDmx;}

async function sendChannel(ch,value){
  const root=endpoint();
  if(!root)throw new Error('Set Pico base URL first');
  const url=root+'/dmx/set/'+ch+'/'+clamp(value,0,255);
  if(root!==location.origin){
    await new Promise(resolve=>{
      const img=new Image();
      img.onload=resolve; img.onerror=resolve;
      img.src=url+'?t='+Date.now();
      setTimeout(resolve,200);
    });
    return;
  }
  const r=await fetch(url,{cache:'no-store'});
  if(!r.ok)throw new Error('HTTP '+r.status+' on channel '+ch);
}

async function sendControl(f,c){
  if(c.type==='panTilt16'){
    const v=getValue(f,c,{pan:32768,tilt:32768});
    if(!channelOk(f,c.pan,2)||!channelOk(f,c.tilt,2))throw new Error('Pan/Tilt channels out of range');
    const pan=bytes16(v.pan),tilt=bytes16(v.tilt);
    await sendChannel(absolute(f.start,c.pan),pan.coarse);
    await sendChannel(absolute(f.start,c.panFine??c.pan+1),pan.fine);
    await sendChannel(absolute(f.start,c.tilt),tilt.coarse);
    await sendChannel(absolute(f.start,c.tiltFine??c.tilt+1),tilt.fine);
  }else if(c.type==='panTilt8'){
    const v=getValue(f,c,{pan:128,tilt:128});
    if(!channelOk(f,c.pan)||!channelOk(f,c.tilt))throw new Error('Pan/Tilt channels out of range');
    await sendChannel(absolute(f.start,c.pan),v.pan);
    await sendChannel(absolute(f.start,c.tilt),v.tilt);
  }else if(c.type==='slider16'){
    const v=bytes16(getValue(f,c,0));
    if(!channelOk(f,c.channel)||!channelOk(f,c.fine??c.channel+1))throw new Error(c.label+' channels out of range');
    await sendChannel(absolute(f.start,c.channel),v.coarse);
    await sendChannel(absolute(f.start,c.fine??c.channel+1),v.fine);
  }else if(c.type==='rgb'||c.type==='rgbw'||c.type==='rgbwa'||c.type==='cmy'||c.type==='cmyk'){
    const v=getValue(f,c,c.type==='cmyk'?{a:0,b:0,c:0,k:0}:(c.type==='rgbw'?{a:0,b:0,c:0,w:0}:(c.type==='rgbwa'?{a:0,b:0,c:0,w:0,amber:0}:{a:0,b:0,c:0})));
    if(!channelOk(f,c.a)||!channelOk(f,c.b)||!channelOk(f,c.c)||((c.type==='rgbw'||c.type==='rgbwa')&&!channelOk(f,c.w))||(c.type==='rgbwa'&&!channelOk(f,c.amber))||(c.type==='cmyk'&&!channelOk(f,c.k)))throw new Error(c.label+' channels out of range');
    await sendChannel(absolute(f.start,c.a),v.a);
    await sendChannel(absolute(f.start,c.b),v.b);
    await sendChannel(absolute(f.start,c.c),v.c);
    if(c.type==='rgbw'||c.type==='rgbwa')await sendChannel(absolute(f.start,c.w),v.w);
    if(c.type==='rgbwa')await sendChannel(absolute(f.start,c.amber),v.amber);
    if(c.type==='cmyk')await sendChannel(absolute(f.start,c.k),v.k);
  }else{
    if(!channelOk(f,c.channel))throw new Error(c.label+' channel out of range');
    await sendChannel(absolute(f.start,c.channel),getValue(f,c,0));
  }
  setStatus('Sent '+f.name+' '+c.label);
}

function parseWheelOptions(text){
  return text.split(/\r?\n/).map(line=>line.trim()).filter(Boolean).map(line=>{
    const parts=line.split('=');
    const meta=(parts.slice(1).join('=')||'0').split('|');
    const visual=(meta[1]||'').trim();
    const option={name:(parts[0]||'Value').trim(),value:clamp(meta[0],0,255)};
    if(visual.startsWith('#'))option.color=visual;
    else if(visual.startsWith('data:image/'))option.image=visual;
    return option;
  });
}

function wheelOptionsText(options){
  return (options||[]).map(o=>o.name+'='+clamp(o.value,0,255)+(o.image?'|'+o.image:(o.color?'|'+o.color:''))).join('\n');
}

function addDefaultProfile(){
  const p={id:uid(),name:'Generic Moving Head',mode:'16ch',channels:16,controls:[
    {id:uid(),type:'panTilt16',label:'Position',pan:1,tilt:3},
    {id:uid(),type:'slider8',label:'Dimmer',channel:5},
    {id:uid(),type:'wheel',label:'Color wheel',channel:6,options:[{name:'Open',value:0},{name:'Red',value:16},{name:'Green',value:32},{name:'Blue',value:48}]},
    {id:uid(),type:'wheel',label:'Gobo wheel',channel:7,options:[{name:'Open',value:0},{name:'Gobo 1',value:24},{name:'Gobo 2',value:48}]},
    {id:uid(),type:'slider8',label:'Strobe',channel:8},
    {id:uid(),type:'slider8',label:'Prism',channel:9},
    {id:uid(),type:'slider8',label:'Prism rotation',channel:10}
  ]};
  profiles.push(p);activeProfileId=p.id;draw();
}

function addProfile(){
  const p={id:uid(),name:document.getElementById('profileName').value||'Fixture',mode:document.getElementById('profileMode').value||'mode',channels:clamp(document.getElementById('profileChannels').value,1,512),controls:[]};
  profiles.push(p);activeProfileId=p.id;draw();
}

function loadProfileEditor(profile){
  document.getElementById('profileName').value=profile.name||'';
  document.getElementById('profileMode').value=profile.mode||'';
  document.getElementById('profileChannels').value=profile.channels||1;
}

function saveProfile(){
  const profile=activeProfile();
  if(!profile){showError('Select a profile first');return;}
  const channels=clamp(document.getElementById('profileChannels').value,1,512);
  const used=[...new Set(profile.controls.flatMap(controlChannels).filter(ch=>ch>=1))];
  const highest=used.reduce((max,ch)=>Math.max(max,ch),0);
  if(highest>channels){showError('Profile uses channel '+highest+', so channel count cannot be lower than '+highest);return;}
  profile.name=document.getElementById('profileName').value||'Fixture';
  profile.mode=document.getElementById('profileMode').value||'mode';
  profile.channels=channels;
  setStatus('Profile saved');
  draw();
}

function controlFromEditor(existingId=0){
  const type=document.getElementById('controlType').value;
  const label=document.getElementById('controlLabel').value||type;
  const a=clamp(document.getElementById('controlA').value,1,512);
  const b=clamp(document.getElementById('controlB').value,1,512);
  const c=clamp(document.getElementById('controlC').value,0,512);
  const d=clamp(document.getElementById('controlD').value,0,512);
  const e=clamp(document.getElementById('controlE').value,0,512);
  let control={id:existingId||uid(),type,label};
  if(type==='panTilt16')control={...control,pan:a,panFine:b,tilt:c||b+1,tiltFine:d||c+1||b+2};
  else if(type==='panTilt8')control={...control,pan:a,tilt:b};
  else if(type==='rgb'||type==='cmy')control={...control,a,b,c:c||b+1};
  else if(type==='rgbw')control={...control,a,b,c:c||b+1,w:d||c+1||b+2};
  else if(type==='rgbwa')control={...control,a,b,c:c||b+1,w:d||c+1||b+2,amber:e||d+1||c+2||b+3};
  else if(type==='cmyk')control={...control,a,b,c:c||b+1,k:d||c+1||b+2};
  else if(type==='wheel')control={...control,channel:a,options:parseWheelOptions(document.getElementById('wheelOptions').value)};
  else if(type==='slider16')control={...control,channel:a,fine:b};
  else control={...control,channel:a};
  return control;
}

function controlChannels(control){
  if(control.type==='panTilt16')return [control.pan,control.panFine??control.pan+1,control.tilt,control.tiltFine??control.tilt+1];
  if(control.type==='panTilt8')return [control.pan,control.tilt];
  if(control.type==='slider16')return [control.channel,control.fine??control.channel+1];
  if(control.type==='rgb'||control.type==='cmy')return [control.a,control.b,control.c];
  if(control.type==='rgbw')return [control.a,control.b,control.c,control.w];
  if(control.type==='rgbwa')return [control.a,control.b,control.c,control.w,control.amber];
  if(control.type==='cmyk')return [control.a,control.b,control.c,control.k];
  return [control.channel];
}

function controlChannelText(control){
  if(control.type==='panTilt16')return 'Pan '+control.pan+'/'+(control.panFine??control.pan+1)+', Tilt '+control.tilt+'/'+(control.tiltFine??control.tilt+1);
  if(control.type==='panTilt8')return 'Pan '+control.pan+', Tilt '+control.tilt;
  if(control.type==='slider16')return (control.channel)+'/'+(control.fine??control.channel+1);
  if(control.type==='rgb')return 'R '+control.a+', G '+control.b+', B '+control.c;
  if(control.type==='rgbw')return 'R '+control.a+', G '+control.b+', B '+control.c+', W '+control.w;
  if(control.type==='rgbwa')return 'R '+control.a+', G '+control.b+', B '+control.c+', W '+control.w+', A '+control.amber;
  if(control.type==='cmy')return 'C '+control.a+', M '+control.b+', Y '+control.c;
  if(control.type==='cmyk')return 'C '+control.a+', M '+control.b+', Y '+control.c+', K '+control.k;
  return 'CH '+control.channel;
}

function validateControlChannels(profile,control){
  const channels=controlChannels(control).filter(ch=>ch>=1);
  const duplicateInControl=channels.find((ch,index)=>channels.indexOf(ch)!==index);
  if(duplicateInControl)return 'Control uses channel '+duplicateInControl+' more than once';
  const outOfRange=channels.find(ch=>ch<1||ch>profile.channels);
  if(outOfRange)return 'Channel '+outOfRange+' is outside this profile mode range 1-'+profile.channels;
  const used=new Map();
  profile.controls.forEach(existing=>{
    if(existing.id===control.id)return;
    controlChannels(existing).forEach(ch=>used.set(ch,existing.label));
  });
  const conflict=channels.find(ch=>used.has(ch));
  if(conflict)return 'Channel '+conflict+' is already used by '+used.get(conflict);
  return '';
}

function channelCountForType(type){
  return {
    panTilt16:4,
    panTilt8:2,
    slider16:2,
    slider8:1,
    wheel:1,
    rgb:3,
    rgbw:4,
    rgbwa:5,
    cmy:3,
    cmyk:4
  }[type]||1;
}

function nextAutoChannelStart(profile,count){
  const used=new Set();
  (profile?.controls||[]).forEach(control=>{
    if(control.id===editingControlId)return;
    controlChannels(control).forEach(ch=>used.add(ch));
  });
  const lastUsed=[...used].reduce((max,ch)=>Math.max(max,ch),0);
  for(let start=lastUsed+1;start<=profile.channels-count+1;start++){
    let free=true;
    for(let offset=0;offset<count;offset++){
      if(used.has(start+offset)){free=false;break;}
    }
    if(free)return start;
  }
  for(let start=1;start<=profile.channels-count+1;start++){
    let free=true;
    for(let offset=0;offset<count;offset++){
      if(used.has(start+offset)){free=false;break;}
    }
    if(free)return start;
  }
  return 1;
}

function autoFillControlChannels(){
  const profile=activeProfile();
  if(!profile)return;
  const type=document.getElementById('controlType').value;
  const count=channelCountForType(type);
  const start=nextAutoChannelStart(profile,count);
  ['A','B','C','D','E'].forEach((letter,index)=>{
    document.getElementById('control'+letter).value=index<count?start+index:0;
  });
}

function addControl(){
  const p=profiles.find(profile=>profile.id===activeProfileId);
  if(!p){showError('Select a profile first');return;}
  const control=controlFromEditor(editingControlId);
  const channelError=validateControlChannels(p,control);
  if(channelError){showError(channelError);return;}
  if(editingControlId){
    const index=p.controls.findIndex(c=>c.id===editingControlId);
    if(index>=0)p.controls[index]=control;
    setStatus('Control updated');
  }else{
    p.controls.push(control);
    setStatus('Control added');
  }
  resetControlEditor();
  draw();
}

function fixtureAddressConflict(start,channels,excludeId){
  const end=start+channels-1;
  return fixtures.find(f=>{
    if(f.id===excludeId)return false;
    const p=fixtureProfile(f);
    if(!p)return false;
    return start<=f.start+p.channels-1&&end>=f.start;
  });
}
function nextFreePatchAddress(channels){
  for(let start=1;start+channels-1<=maxDmx;start++){
    if(!fixtureAddressConflict(start,channels))return start;
  }
  return 1;
}
function patchFixture(){
  const profileId=parseInt(patchProfile.value,10);
  const profile=profiles.find(p=>p.id===profileId);
  if(!profile){showError('Add a profile first');return;}
  let start=clamp(document.getElementById('fixtureStart').value,1,512);
  if(start+profile.channels-1>maxDmx){showError('Fixture exceeds DMX channel 512');return;}
  if(fixtureAddressConflict(start,profile.channels)){
    const free=nextFreePatchAddress(profile.channels);
    if(free+profile.channels-1>maxDmx){showError('No free address range for '+profile.channels+' channels in the universe');return;}
    document.getElementById('fixtureStart').value=free;
    start=free;
  }
  fixtures.push({id:uid(),name:document.getElementById('fixtureName').value||profile.name,profileId,start});
  draw();
}

function saveData(){return {baseUrl:baseUrl.value,live:live.checked,profiles,fixtures,values};}
function applyData(data){
  baseUrl.value=localStorage.getItem('dmxPicoBaseUrl')||data?.baseUrl||'';
  if(data?.live!==undefined)live.checked=data.live;
  profiles=Array.isArray(data?.profiles)?data.profiles:[];
  fixtures=Array.isArray(data?.fixtures)?data.fixtures:[];
  Object.keys(values).forEach(k=>delete values[k]);
  Object.assign(values,data?.values||{});
  activeProfileId=profiles[0]?.id||0;
  if(!profiles.length)addDefaultProfile();
  draw();
}

async function saveSetup(){
  localStorage.setItem('dmxFixtureController',JSON.stringify(saveData()));
  if(location.protocol==='http:'||location.protocol==='https:'){
    const r=await fetch('fixture_setup.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(saveData())});
    const j=await r.json();
    if(!r.ok||!j.ok)throw new Error(j.error||('HTTP '+r.status));
    setStatus('Setup saved to server');
  }else setStatus('Setup saved in browser only');
}

async function loadSetup(){
  if(location.protocol==='http:'||location.protocol==='https:'){
    const r=await fetch('fixture_setup.php',{cache:'no-store'});
    const j=await r.json();
    if(r.ok&&j.ok&&j.exists){applyData(j.setup);setStatus('Setup loaded from server');return true;}
  }
  const raw=localStorage.getItem('dmxFixtureController');
  if(raw){applyData(JSON.parse(raw));setStatus('Setup loaded from browser');return true;}
  return false;
}

  if(c.type==='rgb'||c.type==='rgbw'||c.type==='rgbwa'||c.type==='cmy'||c.type==='cmyk'){

    const color=(c.type==='rgb'||c.type==='rgbw'||c.type==='rgbwa')?rgbHex(v):(c.type==='cmy'?cmyHex(v):cmykHex(v));

      document.querySelectorAll(`[data-fixture="${f.id}"][data-control="${c.id}"][data-byte-readout="${axis}Fine"]`).forEach(el=>el.textContent=b.fine);

  });
  document.querySelectorAll(`input[data-fixture="${f.id}"][data-control="${c.id}"]:not([data-part])`).forEach(el=>{if(el.value!=v)el.value=v;});
  if(c.type==='slider16'){
    const b=bytes16(v);
    document.querySelectorAll(`input[data-fixture="${f.id}"][data-control="${c.id}"][data-byte-part="coarse"]`).forEach(el=>{if(el.value!=b.coarse)el.value=b.coarse;});
    document.querySelectorAll(`input[data-fixture="${f.id}"][data-control="${c.id}"][data-byte-part="fine"]`).forEach(el=>{if(el.value!=b.fine)el.value=b.fine;});
    document.querySelectorAll(`[data-fixture="${f.id}"][data-control="${c.id}"][data-byte-readout="coarse"]`).forEach(el=>el.textContent=b.coarse);
    document.querySelectorAll(`[data-fixture="${f.id}"][data-control="${c.id}"][data-byte-readout="fine"]`).forEach(el=>el.textContent=b.fine);
  }
}

profilesEl.onclick=e=>{
  const select=e.target.dataset.profile;
  const remove=e.target.dataset.removeProfile;
  const editControl=e.target.dataset.editControl;
  const removeControl=e.target.dataset.removeControl;
  if(select){
    activeProfileId=parseInt(select,10);
    const p=activeProfile();
    if(p)loadProfileEditor(p);
    if(!editingControlId)updateControlChannelInputs(true);
  }
  if(editControl){
    const p=profiles.find(profile=>profile.id===parseInt(e.target.dataset.profile,10));
    const c=p?.controls.find(control=>control.id===parseInt(editControl,10));
    if(p&&c){activeProfileId=p.id;loadProfileEditor(p);loadControlEditor(c);setStatus('Editing '+c.label);}
    draw();
    return;
  }
  if(removeControl){
    const p=profiles.find(profile=>profile.id===parseInt(e.target.dataset.profile,10));
    if(p){
      p.controls=p.controls.filter(control=>control.id!==parseInt(removeControl,10));
      if(editingControlId===parseInt(removeControl,10))resetControlEditor();
      setStatus('Control removed');
    }
    draw();
    return;
  }
  if(remove){profiles=profiles.filter(p=>p.id!==parseInt(remove,10));fixtures=fixtures.filter(f=>f.profileId!==parseInt(remove,10));activeProfileId=profiles[0]?.id||0;resetControlEditor();}
  draw();
};
patchedEl.onclick=e=>{if(e.target.dataset.removeFixture){fixtures=fixtures.filter(f=>f.id!==parseInt(e.target.dataset.removeFixture,10));draw();}};

surfaceEl.oninput=e=>{
  const f=fixtures.find(x=>x.id===parseInt(e.target.dataset.fixture,10));
  const p=f&&fixtureProfile(f);
  const c=p&&p.controls.find(x=>x.id===parseInt(e.target.dataset.control,10));
  if(!f||!c)return;
  if(e.target.dataset.colorPicker){
    if(c.type==='rgb'||c.type==='rgbw'||c.type==='rgbwa'){
      const current=getValue(f,c,c.type==='rgbw'?{a:0,b:0,c:0,w:0}:(c.type==='rgbwa'?{a:0,b:0,c:0,w:0,amber:0}:{a:0,b:0,c:0}));
      const rgb=hexToRgb(e.target.value);
      setValue(f,c,{...current,a:rgb.a,b:rgb.b,c:rgb.c});
    }
    else if(c.type==='cmy')setValue(f,c,rgbToCmy(e.target.value));
    else if(c.type==='cmyk')setValue(f,c,rgbToCmyk(e.target.value));
  }else if(e.target.dataset.bytePart){
    if(c.type==='panTilt16'){
      const axis=e.target.dataset.byteAxis;
      const v=getValue(f,c,{pan:32768,tilt:32768});
      const b=bytes16(v[axis]);
      b[e.target.dataset.bytePart]=clamp(e.target.value,0,255);
      v[axis]=(b.coarse<<8)|b.fine;
      setValue(f,c,v);
    }else{
      const b=bytes16(getValue(f,c,0));
      b[e.target.dataset.bytePart]=clamp(e.target.value,0,255);
      setValue(f,c,(b.coarse<<8)|b.fine);
    }
  }else if(e.target.dataset.axis){
    const is8=c.type==='panTilt8';
    const v=getValue(f,c,is8?{pan:128,tilt:128}:{pan:32768,tilt:32768});
    v[e.target.dataset.axis]=clamp(e.target.value,0,is8?255:65535);
    setValue(f,c,v);
  }else if(e.target.dataset.part){
    const v=getValue(f,c,{a:0,b:0,c:0});v[e.target.dataset.part]=clamp(e.target.value,0,255);setValue(f,c,v);
  }else setValue(f,c,clamp(e.target.value,0,c.type==='slider16'?65535:255));
  if(live.checked)sendControl(f,c).catch(err=>setStatus(err.message,true));
  updateControlDisplay(f,c);
};
surfaceEl.onclick=e=>{
  const f=fixtures.find(x=>x.id===parseInt(e.target.dataset.fixture||e.target.dataset.sendFixture,10));
  const p=f&&fixtureProfile(f);
  const c=p&&p.controls.find(x=>x.id===parseInt(e.target.dataset.control,10));
  if(!f||!c)return;
  if(e.target.dataset.centerPantilt){
    setValue(f,c,c.type==='panTilt8'?{pan:128,tilt:128}:{pan:32768,tilt:32768});
    if(live.checked)sendControl(f,c).catch(err=>setStatus(err.message,true));
    updateControlDisplay(f,c);
    return;
  }
  if(e.target.dataset.color){
    if(c.type==='rgb'||c.type==='rgbw'||c.type==='rgbwa'){
      const current=getValue(f,c,c.type==='rgbw'?{a:0,b:0,c:0,w:0}:(c.type==='rgbwa'?{a:0,b:0,c:0,w:0,amber:0}:{a:0,b:0,c:0}));
      const rgb=hexToRgb(e.target.dataset.color);
      setValue(f,c,{...current,a:rgb.a,b:rgb.b,c:rgb.c});
    }
    else if(c.type==='cmy')setValue(f,c,rgbToCmy(e.target.dataset.color));
    else if(c.type==='cmyk')setValue(f,c,rgbToCmyk(e.target.dataset.color));
    sendControl(f,c).catch(err=>setStatus(err.message,true));drawSurface();return;
  }
  if(e.target.dataset.wheel!==undefined){
    setValue(f,c,clamp(e.target.dataset.wheel,0,255));
    if(live.checked)sendControl(f,c).catch(err=>setStatus(err.message,true));drawSurface();return;
  }
  if(e.target.dataset.sendFixture)sendControl(f,c).catch(err=>setStatus(err.message,true));
};
surfaceEl.addEventListener('pointerdown',e=>{
  const pad=e.target.closest('[data-xy-fixture]');if(!pad)return;pad.setPointerCapture(e.pointerId);setXY(e,pad);
});
surfaceEl.addEventListener('pointermove',e=>{
  const pad=e.target.closest('[data-xy-fixture]');if(!pad||!pad.hasPointerCapture(e.pointerId))return;setXY(e,pad);
});
function setXY(e,pad){
  const f=fixtures.find(x=>x.id===parseInt(pad.dataset.xyFixture,10));
  const p=f&&fixtureProfile(f);
  const c=p&&p.controls.find(x=>x.id===parseInt(pad.dataset.control,10));
  if(!f||!c)return;
  const r=pad.getBoundingClientRect();
  const x=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  const y=Math.max(0,Math.min(1,(e.clientY-r.top)/r.height));
  const max=c.type==='panTilt8'?255:65535;
  setValue(f,c,{pan:Math.round(x*max),tilt:Math.round((1-y)*max)});
  if(live.checked)sendControl(f,c).catch(err=>setStatus(err.message,true));
  updateControlDisplay(f,c);
}

document.getElementById('addProfile').onclick=addProfile;
document.getElementById('saveProfile').onclick=saveProfile;
document.getElementById('addControl').onclick=addControl;
document.getElementById('cancelEdit').onclick=()=>{resetControlEditor();setStatus('Edit cancelled');};
document.getElementById('controlType').onchange=()=>updateControlChannelInputs(!editingControlId);
function csvEsc(v){v=String(v??'');return(v.includes(',')||v.includes('"')||v.includes('\n'))?'"'+v.replace(/"/g,'""')+'"':v;}
function resolveDmxBytes(f,c){
  const out=[];
  if(c.type==='panTilt16'){const v=getValue(f,c,{pan:32768,tilt:32768});const pan=bytes16(v.pan),tilt=bytes16(v.tilt);out.push({ch:absolute(f.start,c.pan),val:pan.coarse,param:'Pan coarse'},{ch:absolute(f.start,c.panFine??c.pan+1),val:pan.fine,param:'Pan fine'},{ch:absolute(f.start,c.tilt),val:tilt.coarse,param:'Tilt coarse'},{ch:absolute(f.start,c.tiltFine??c.tilt+1),val:tilt.fine,param:'Tilt fine'});}
  else if(c.type==='panTilt8'){const v=getValue(f,c,{pan:128,tilt:128});out.push({ch:absolute(f.start,c.pan),val:v.pan,param:'Pan'},{ch:absolute(f.start,c.tilt),val:v.tilt,param:'Tilt'});}
  else if(c.type==='slider16'){const v=bytes16(getValue(f,c,0));out.push({ch:absolute(f.start,c.channel),val:v.coarse,param:'Coarse'},{ch:absolute(f.start,c.fine??c.channel+1),val:v.fine,param:'Fine'});}
  else if(['rgb','rgbw','rgbwa','cmy','cmyk'].includes(c.type)){
    const defVal=c.type==='cmyk'?{a:0,b:0,c:0,k:0}:c.type==='rgbw'?{a:0,b:0,c:0,w:0}:c.type==='rgbwa'?{a:0,b:0,c:0,w:0,amber:0}:{a:0,b:0,c:0};
    const v=getValue(f,c,defVal);
    const names=(c.type==='rgb'||c.type==='rgbw'||c.type==='rgbwa')?['Red','Green','Blue','White','Amber']:c.type==='cmy'?['Cyan','Magenta','Yellow']:['Cyan','Magenta','Yellow','Key'];
    const parts=c.type==='cmyk'?['a','b','c','k']:c.type==='rgbw'?['a','b','c','w']:c.type==='rgbwa'?['a','b','c','w','amber']:['a','b','c'];
    parts.forEach((p,i)=>out.push({ch:absolute(f.start,c[p]),val:v[p],param:names[i]}));
  }
  else out.push({ch:absolute(f.start,c.channel),val:getValue(f,c,0),param:c.type==='wheel'?'Wheel':'Value'});
  return out;
}
function exportCsv(){
  const rows=['Channel,Value,Fixture,Profile,Control,Parameter'];
  fixtures.forEach(f=>{
    const p=fixtureProfile(f);if(!p)return;
    p.controls.forEach(c=>{
      resolveDmxBytes(f,c).forEach(({ch,val,param})=>{
        rows.push([ch,val,csvEsc(f.name),csvEsc(p.name+' '+p.mode),csvEsc(c.label),csvEsc(param)].join(','));
      });
    });
  });
  const blob=new Blob([rows.join('\r\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='dmx_patch.csv';a.click();URL.revokeObjectURL(a.href);
  setStatus('Exported '+( rows.length-1)+' channel'+(rows.length-1===1?'':'s')+' to CSV');
}
document.getElementById('patchFixture').onclick=patchFixture;
document.getElementById('nextFreeAddr').onclick=()=>{
  const profileId=parseInt(patchProfile.value,10);
  const profile=profiles.find(p=>p.id===profileId);
  if(!profile){setStatus('Select a profile first',true);return;}
  document.getElementById('fixtureStart').value=nextFreePatchAddress(profile.channels);
};
patchProfile.onchange=()=>{
  const profileId=parseInt(patchProfile.value,10);
  const profile=profiles.find(p=>p.id===profileId);
  if(profile)document.getElementById('fixtureStart').value=nextFreePatchAddress(profile.channels);
};
document.getElementById('save').onclick=()=>saveSetup().catch(err=>setStatus(err.message,true));
document.getElementById('load').onclick=()=>loadSetup().then(ok=>{if(!ok)setStatus('No saved setup found',true);}).catch(err=>setStatus(err.message,true));
document.getElementById('exportCsv').onclick=exportCsv;
document.getElementById('exportJson').onclick=()=>{
  const blob=new Blob([JSON.stringify(saveData(),null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='fixture_setup.json';a.click();URL.revokeObjectURL(a.href);
  setStatus('fixture_setup.json downloaded');
};
document.getElementById('importJson').onclick=()=>document.getElementById('importJsonFile').click();
document.getElementById('importJsonFile').onchange=e=>{
  const file=e.target.files?.[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      applyData(data);
      setStatus('Setup imported from '+file.name);
    }catch(err){showError('Invalid JSON: '+err.message);}
    e.target.value='';
  };
  reader.readAsText(file);
};

const goboCanvas=document.getElementById('goboCanvas');
const goboCtx=goboCanvas.getContext('2d');
let goboDrawing=false;
let uploadedWheelImage='';
let goboTouched=false;
function clearGobo(){
  goboCtx.fillStyle='#000000';
  goboCtx.fillRect(0,0,goboCanvas.width,goboCanvas.height);
  goboCtx.beginPath();
  goboCtx.strokeStyle='#ffffff';
  goboCtx.lineWidth=6;
  goboCtx.lineCap='round';
  uploadedWheelImage='';
  goboTouched=false;
  document.getElementById('wheelImage').value='';
}
function drawGobo(e){
  const rect=goboCanvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)*goboCanvas.width/rect.width;
  const y=(e.clientY-rect.top)*goboCanvas.height/rect.height;
  if(!goboDrawing){
    goboCtx.beginPath();
    goboCtx.moveTo(x,y);
    return;
  }
  goboCtx.lineTo(x,y);
  goboCtx.stroke();
  goboCtx.beginPath();
  goboCtx.moveTo(x,y);
  goboTouched=true;
}
goboCanvas.addEventListener('pointerdown',e=>{goboDrawing=false;goboCanvas.setPointerCapture(e.pointerId);drawGobo(e);goboDrawing=true;uploadedWheelImage='';goboTouched=true;});
goboCanvas.addEventListener('pointermove',e=>{if(goboDrawing)drawGobo(e);});
goboCanvas.addEventListener('pointerup',()=>{goboDrawing=false;uploadedWheelImage='';});
goboCanvas.addEventListener('pointercancel',()=>{goboDrawing=false;});
document.getElementById('clearGobo').onclick=clearGobo;
document.getElementById('wheelImage').onchange=e=>{
  const file=e.target.files?.[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      clearGobo();
      goboCtx.drawImage(img,0,0,goboCanvas.width,goboCanvas.height);
      uploadedWheelImage=goboCanvas.toDataURL('image/png');
      goboTouched=true;
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
};
document.getElementById('addWheelOption').onclick=()=>{
  const name=document.getElementById('wheelName').value||'Value';
  const value=clamp(document.getElementById('wheelValue').value,0,255);
  const image=uploadedWheelImage||goboCanvas.toDataURL('image/png');
  const color=document.getElementById('wheelColor').value;
  const useImage=goboTouched&&image;
  const visual=useImage?image:color;
  const text=document.getElementById('wheelOptions');
  text.value=(text.value.trim()?text.value.trim()+'\n':'')+name+'='+value+'|'+visual;
  setStatus('Wheel option added');
};
updateControlChannelInputs(true);
clearGobo();
loadSetup().then(ok=>{if(!ok)addDefaultProfile();}).catch(()=>addDefaultProfile());
