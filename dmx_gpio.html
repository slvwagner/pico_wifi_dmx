<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DMX GPIO Control</title>
<style>
:root{color-scheme:dark;--bg:#0d1115;--panel:#161c22;--line:#31404d;--text:#edf3f7;--muted:#9cafbf;--accent:#37c4a4;--warn:#ffbc6b;--bad:#ff7a7a}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,sans-serif}
main{max-width:1160px;margin:0 auto;padding:20px;display:grid;gap:16px}
header{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
h1{font-size:22px;margin:0}h2{font-size:16px;margin:0}.status,.small{color:var(--muted);font-size:13px}.bad{color:var(--bad)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;display:grid;gap:12px}
.toolbar,.row{display:flex;gap:10px;align-items:end;flex-wrap:wrap}
label{display:grid;gap:6px;color:var(--muted);font-size:13px}
input,button,select{font:inherit}
input,select{padding:10px;background:#0a0d10;color:var(--text);border:1px solid var(--line);border-radius:6px}
input[type=number]{width:86px}input[type=url]{min-width:260px}
button{border:1px solid var(--line);background:#22303a;color:var(--text);padding:10px 14px;border-radius:6px;cursor:pointer}
button.primary{background:var(--accent);border-color:var(--accent);color:#06110e;font-weight:700}
button.danger{background:#3c1b1b;border-color:#763232;color:var(--bad)}
button:disabled{opacity:.45;cursor:not-allowed}
a.nav{color:var(--muted);font-size:13px;text-decoration:none;border:1px solid var(--line);padding:10px 14px;border-radius:6px}
a.nav:hover{color:var(--text)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px}
.mapping{background:#10161b;border:1px solid var(--line);border-radius:8px;padding:12px;display:grid;gap:10px}
.mapping-head{display:flex;justify-content:space-between;gap:10px;align-items:center}
.mapping-fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:20px;padding:4px 10px;color:var(--muted);font-size:12px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--muted);display:inline-block}
.dot.on{background:var(--accent)}
pre{margin:0;background:#0a0d10;border:1px solid var(--line);border-radius:8px;padding:12px;overflow:auto;color:var(--muted)}
</style>
</head>
<body>
<main>
<header>
  <div>
    <h1>GPIO Control</h1>
    <div class="status" id="status">Ready</div>
  </div>
  <div class="toolbar">
    <label>Pico base URL<input id="baseUrl" type="url" placeholder="http://192.168.1.50"></label>
    <a class="nav" href="index.html">Controller</a>
    <a class="nav" href="dmx_chaser.html">Chaser</a>
    <a class="nav" href="dmx_motion.html">Motion</a>
    <a class="nav" href="dmx_fan.html">Fan Out</a>
  </div>
</header>

<section class="panel">
  <div class="row" style="justify-content:space-between;align-items:center">
    <h2>GPIO Mappings</h2>
    <span class="pill"><span class="dot" id="onlineDot"></span><span id="onlineText">not connected</span></span>
  </div>
  <div class="toolbar">
    <label><input id="gpioEnabled" type="checkbox" checked> GPIO polling enabled</label>
    <button id="addMapping" class="primary">Add mapping</button>
    <button id="pushConfig">Push to Pico</button>
    <button id="pullConfig">Read from Pico</button>
    <button id="saveLocal">Save local</button>
    <button id="clearLocal" class="danger">Clear local</button>
  </div>
  <div id="mappingList" class="grid"></div>
</section>

<section class="panel">
  <h2>Status</h2>
  <div class="grid">
    <div class="mapping">
      <div class="small">Pico GPIO status</div>
      <div id="gpioStatus" class="small">No status yet.</div>
    </div>
    <div class="mapping">
      <div class="small">Generated config body</div>
      <pre id="configPreview"></pre>
    </div>
  </div>
</section>
</main>

<script>
const PICO_SLOT_COUNT=16;
const DEFAULT_MAPPINGS=[
  {pin:14,pull:'pullup',trigger:'falling',action:'dmx_clear',slot:0,debounce_ms:30},
  {pin:15,pull:'pullup',trigger:'falling',action:'chaser_toggle',slot:0,debounce_ms:30}
];
let mappings=[];
const baseUrl=document.getElementById('baseUrl');
const statusEl=document.getElementById('status');

function setStatus(msg,bad=false){statusEl.textContent=msg;statusEl.className=bad?'status bad':'status';}
function endpoint(){return baseUrl.value.replace(/\/+$/,'');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function clamp(v,lo,hi){v=parseInt(v);return Math.max(lo,Math.min(hi,isNaN(v)?lo:v));}
function actionNeedsSlot(a){return a.startsWith('chaser_')||a.startsWith('motion_');}
function normalize(m){
  return {
    pin:clamp(m.pin,0,28),
    pull:m.pull==='pulldown'?'pulldown':'pullup',
    trigger:['falling','rising','both'].includes(m.trigger)?m.trigger:'falling',
    action:['dmx_clear','stop_all','chaser_play','chaser_stop','chaser_toggle','motion_start','motion_stop','motion_toggle'].includes(m.action)?m.action:'dmx_clear',
    slot:clamp(m.slot,0,PICO_SLOT_COUNT-1),
    debounce_ms:clamp(m.debounce_ms,5,1000)
  };
}
function loadLocal(){
  try{
    const raw=localStorage.getItem('dmxGPIOConfig');
    mappings=raw?JSON.parse(raw).map(normalize):DEFAULT_MAPPINGS.map(normalize);
  }catch(_){mappings=DEFAULT_MAPPINGS.map(normalize);}
  document.getElementById('gpioEnabled').checked=localStorage.getItem('dmxGPIOEnabled')!=='0';
}
function saveLocal(){
  localStorage.setItem('dmxGPIOConfig',JSON.stringify(mappings));
  localStorage.setItem('dmxGPIOEnabled',document.getElementById('gpioEnabled').checked?'1':'0');
  setStatus('GPIO config saved locally');
}
function configText(){
  const lines=['ENABLE '+(document.getElementById('gpioEnabled').checked?'1':'0')];
  mappings.map(normalize).forEach(m=>lines.push(['MAP',m.pin,m.pull,m.trigger,m.action,m.slot,m.debounce_ms].join(' ')));
  return lines.join('\n')+'\n';
}
function render(){
  const list=document.getElementById('mappingList');
  list.innerHTML=mappings.map((m,i)=>{
    m=normalize(m);
    const slotDisabled=actionNeedsSlot(m.action)?'':'disabled';
    return `<div class="mapping" data-idx="${i}">
      <div class="mapping-head"><strong>Mapping ${i+1}</strong><button class="danger" data-remove="${i}">Remove</button></div>
      <div class="mapping-fields">
        <label>GPIO pin<input type="number" min="0" max="28" value="${m.pin}" data-field="pin"></label>
        <label>Pull<select data-field="pull"><option value="pullup"${m.pull==='pullup'?' selected':''}>Pull-up</option><option value="pulldown"${m.pull==='pulldown'?' selected':''}>Pull-down</option></select></label>
        <label>Trigger<select data-field="trigger"><option value="falling"${m.trigger==='falling'?' selected':''}>Falling</option><option value="rising"${m.trigger==='rising'?' selected':''}>Rising</option><option value="both"${m.trigger==='both'?' selected':''}>Both</option></select></label>
        <label>Action<select data-field="action">
          ${['dmx_clear','stop_all','chaser_play','chaser_stop','chaser_toggle','motion_start','motion_stop','motion_toggle'].map(a=>`<option value="${a}"${m.action===a?' selected':''}>${a.replace(/_/g,' ')}</option>`).join('')}
        </select></label>
        <label>Slot<input type="number" min="0" max="${PICO_SLOT_COUNT-1}" value="${m.slot}" data-field="slot" ${slotDisabled}></label>
        <label>Debounce ms<input type="number" min="5" max="1000" value="${m.debounce_ms}" data-field="debounce_ms"></label>
      </div>
    </div>`;
  }).join('');
  document.getElementById('configPreview').textContent=configText();
}
async function pushConfig(){
  const root=endpoint();
  if(!root){setStatus('Set Pico base URL first',true);return;}
  try{
    const r=await fetch(root+'/gpio/config',{method:'POST',body:configText(),headers:{'Content-Type':'text/plain'},cache:'no-store'});
    const j=await r.json();
    if(!j.ok)throw new Error(j.error||'GPIO config failed');
    saveLocal();
    setStatus('GPIO config pushed to Pico');
    pollStatus();
  }catch(e){setStatus(e.message,true);}
}
async function pullConfig(){
  const root=endpoint();
  if(!root){setStatus('Set Pico base URL first',true);return;}
  try{
    const j=await fetch(root+'/gpio/config',{cache:'no-store'}).then(r=>r.json());
    if(!j.ok)throw new Error(j.error||'GPIO config failed');
    document.getElementById('gpioEnabled').checked=!!j.enabled;
    mappings=(j.mappings||[]).map(normalize);
    saveLocal();
    render();
    setStatus('GPIO config read from Pico');
  }catch(e){setStatus(e.message,true);}
}
async function pollStatus(){
  const root=endpoint();
  if(!root)return;
  try{
    const j=await fetch(root+'/gpio/status',{cache:'no-store'}).then(r=>r.json());
    if(!j.ok)throw new Error(j.error||'status failed');
    document.getElementById('onlineDot').classList.add('on');
    document.getElementById('onlineText').textContent='connected';
    const inputs=(j.inputs||[]).map(i=>'GPIO '+i.pin+': raw '+(i.value?'HIGH':'LOW')+', stable '+(i.stable?'HIGH':'LOW')).join('<br>');
    document.getElementById('gpioStatus').innerHTML=
      'Enabled: '+j.enabled+'<br>Mappings: '+j.mapping_count+'<br>Events: '+j.event_count+
      '<br>Last: GPIO '+j.last_pin+' '+j.last_action+' @ '+j.last_event_ms+' ms'+
      (inputs?'<br><br>'+inputs:'');
  }catch(e){
    document.getElementById('onlineDot').classList.remove('on');
    document.getElementById('onlineText').textContent='not connected';
    document.getElementById('gpioStatus').textContent=e.message;
  }
}

baseUrl.value=localStorage.getItem('dmxPicoBaseUrl')||'';
baseUrl.addEventListener('input',()=>localStorage.setItem('dmxPicoBaseUrl',baseUrl.value));
document.getElementById('addMapping').onclick=()=>{mappings.push(normalize({pin:14,pull:'pullup',trigger:'falling',action:'dmx_clear',slot:0,debounce_ms:30}));render();};
document.getElementById('pushConfig').onclick=pushConfig;
document.getElementById('pullConfig').onclick=pullConfig;
document.getElementById('saveLocal').onclick=()=>{saveLocal();render();};
document.getElementById('clearLocal').onclick=()=>{if(confirm('Clear local GPIO mappings?')){mappings=[];saveLocal();render();}};
document.getElementById('gpioEnabled').addEventListener('change',render);
document.getElementById('mappingList').addEventListener('change',e=>{
  const card=e.target.closest('[data-idx]');if(!card)return;
  const i=parseInt(card.dataset.idx);const field=e.target.dataset.field;if(!field)return;
  mappings[i][field]=e.target.value;
  mappings[i]=normalize(mappings[i]);
  render();
});
document.getElementById('mappingList').addEventListener('click',e=>{
  const rem=e.target.dataset.remove;if(rem===undefined)return;
  mappings.splice(parseInt(rem),1);
  render();
});
loadLocal();
render();
setInterval(pollStatus,1000);
pollStatus();
</script>
</body>
</html>
