<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DMX Chaser</title>
<style>
:root{color-scheme:dark;--bg:#0d1115;--panel:#161c22;--line:#31404d;--text:#edf3f7;--muted:#9cafbf;--accent:#37c4a4;--warn:#ffbc6b;--bad:#ff7a7a}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,sans-serif}
main{max-width:1260px;margin:0 auto;padding:20px;display:grid;gap:16px}
header{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
h1{font-size:22px;margin:0}h2{font-size:18px;margin:0}h3{font-size:15px;margin:0}
.status,.small{color:var(--muted);font-size:13px}.bad{color:var(--bad)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;display:grid;gap:12px}
.toolbar,.buttons,.row{display:flex;gap:10px;align-items:end;flex-wrap:wrap}
label{display:grid;gap:6px;color:var(--muted);font-size:13px}
input,button,select{font:inherit}
input[type=number],input[type=url],input[type=text]{padding:10px;background:#0a0d10;color:var(--text);border:1px solid var(--line);border-radius:6px}
input[type=number]{width:90px}input[type=url]{min-width:220px}input[type=text]{min-width:120px}
input[type=range]{width:120px;accent-color:var(--accent)}
input[type=color]{width:44px;height:36px;padding:2px;background:#0a0d10;border:1px solid var(--line);border-radius:6px;cursor:pointer}
select{padding:10px;background:#0a0d10;color:var(--text);border:1px solid var(--line);border-radius:6px}
button{border:1px solid var(--line);background:#22303a;color:var(--text);padding:10px 14px;border-radius:6px;cursor:pointer}
button.primary{background:var(--accent);border-color:var(--accent);color:#06110e;font-weight:700}
button.warn{background:#3c2b1b;border-color:#765332;color:var(--warn)}
button.stop{background:#3c1b1b;border-color:#763232;color:var(--bad);font-weight:700}
button:disabled{opacity:.45;cursor:not-allowed}
.list{display:grid;gap:6px}
.item{border:1px solid var(--line);border-radius:8px;padding:10px;background:#10161b;display:grid;gap:8px}
.item.active-step{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.item.edit-step{border-color:var(--warn)}
.item.active-step.edit-step{border-color:var(--accent)}
.surface{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;display:grid;gap:12px}
.control{border-top:1px solid var(--line);padding-top:12px;display:grid;gap:8px}
.control-head{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
.readout{font-size:22px;line-height:1;color:var(--accent);font-weight:700}.bytes{color:var(--muted);font-size:13px}
.byte-sliders{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.xy-pad{position:relative;aspect-ratio:1.55/1;border:1px solid var(--line);border-radius:8px;background:linear-gradient(#22303a 1px,transparent 1px),linear-gradient(90deg,#22303a 1px,transparent 1px),#0a0d10;background-size:25% 25%;touch-action:none;cursor:crosshair}
.xy-dot{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid #06110e;box-shadow:0 0 0 1px var(--accent);transform:translate(-50%,-50%);pointer-events:none}
.swatches{display:flex;gap:8px;flex-wrap:wrap}.swatch{min-width:42px;height:34px;padding:0;border-radius:6px}
.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab.active{border-color:var(--accent)}
.option-icon{display:inline-block;width:22px;height:22px;border-radius:4px;border:1px solid var(--line);vertical-align:middle;background-size:cover;background-position:center;margin-right:6px}
.columns{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.progress-bar{height:6px;background:var(--line);border-radius:3px;overflow:hidden;flex:1}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width 0.05s linear}
.step-num{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;border-radius:5px;background:#22303a;font-weight:700;font-size:12px;flex-shrink:0;padding:0 4px}
.step-num.playing{background:var(--accent);color:#06110e}
a.nav{color:var(--muted);font-size:13px;text-decoration:none;border:1px solid var(--line);padding:10px 14px;border-radius:6px}
a.nav:hover{color:var(--text)}
@media(max-width:900px){.columns{grid-template-columns:1fr}.surface{grid-template-columns:1fr}}
</style>
</head>
<body>
<main>

<header>
  <div>
    <h1>DMX Chaser</h1>
    <div class="status" id="status">Loading setup…</div>
  </div>
  <div class="toolbar">
    <label>Pico base URL<input id="baseUrl" type="url" placeholder="http://192.168.1.50"></label>
    <a class="nav" href="index.html">← Fixture Controller</a>
    <a class="nav" href="dmx_motion.html">Motion FX</a>
    <a class="nav" href="dmx_benchmark.html">FPS Test</a>
  </div>
</header>

<!-- Playback bar -->
<section class="panel">
  <div class="toolbar">
    <button class="primary" id="btnPlay">▶ Play</button>
    <button class="stop" id="btnStop" disabled>■ Stop</button>
    <button id="btnPrev">◀ Prev</button>
    <button id="btnNext">Next ▶</button>
    <label><input id="loopCheck" type="checkbox" checked style="accent-color:var(--accent);width:16px;height:16px;padding:0;vertical-align:middle"> Loop</label>
    <label>BPM<input id="bpmInput" type="number" min="1" max="600" value="120"></label>
    <label>Beats/step
      <select id="beatsPerStep">
        <option value="0.25">1/4</option>
        <option value="0.5">1/2</option>
        <option value="1" selected>1</option>
        <option value="2">2</option>
        <option value="4">4</option>
        <option value="8">8</option>
      </select>
    </label>
    <button id="btnTap">Tap tempo</button>
    <label>Default fade %<input id="globalFade" type="number" min="0" max="100" value="0"></label>
    <button id="btnApplyFade" title="Apply default fade % to all steps">↓ All steps</button>
    <label>Update rate (Hz)<input id="updateRate" type="number" min="5" max="50" value="25"></label>
  </div>
  <div class="row" style="align-items:center">
    <div class="progress-bar"><div class="progress-fill" id="stepProgress"></div></div>
    <span class="small" id="playbackInfo" style="white-space:nowrap;min-width:180px">Stopped</span>
  </div>
</section>

<!-- Participation + Step list -->
<section class="columns">
  <div class="panel">
    <div class="row" style="justify-content:space-between;align-items:center">
      <h2>Participating Controls</h2>
      <div class="buttons">
        <button id="btnSelAll" style="padding:6px 10px;font-size:12px">All</button>
        <button id="btnSelNone" style="padding:6px 10px;font-size:12px">None</button>
      </div>
    </div>
    <div class="list" id="participationList"></div>
    <div class="small">Only selected controls are shown in the step editor and sent during playback.</div>
  </div>

  <div class="panel">
    <div class="row" style="justify-content:space-between;flex-wrap:wrap;align-items:center">
      <h2>Steps (<span id="stepCount">0</span>)</h2>
      <div class="buttons">
        <button class="primary" id="btnAddStep">+ Add step</button>
        <button id="btnCaptureNew">⬇ Capture + Add</button>
        <button class="warn" id="btnClearAll">Clear all</button>
      </div>
    </div>
    <div class="list" id="stepList"></div>
    <div class="row" style="flex-wrap:wrap">
      <button id="btnSave">Save chaser</button>
      <button id="btnLoad">Load chaser</button>
      <button id="btnExport">Export JSON</button>
      <button id="btnImport">Import JSON</button>
      <input id="importFile" type="file" accept=".json,application/json" style="display:none">
    </div>
  </div>
</section>

<!-- Step editor -->
<section class="panel" id="stepEditorSection">
  <div class="row" style="justify-content:space-between;flex-wrap:wrap;align-items:center">
    <h2>Edit Step <span id="editorTitle" style="color:var(--warn)"></span></h2>
    <div class="toolbar">
      <label>Label<input id="edLabel" type="text" placeholder="Step label"></label>
      <label>Duration (ms)<input id="edDuration" type="number" min="0" max="60000" value="500"></label>
      <label>Fade %<input id="edFade" type="number" min="0" max="100" value="0"></label>
      <button id="btnApplyMeta">Apply</button>
      <button id="btnCaptureToStep">⬇ Capture from FC</button>
      <label style="flex-direction:row;align-items:center;gap:6px;color:var(--muted);font-size:13px">
        <input id="livePreview" type="checkbox" style="accent-color:var(--accent);width:16px;height:16px;padding:0"> Live preview
      </label>
    </div>
  </div>
  <div id="editorHint" class="small">Select a step to edit its values.</div>
  <div class="surface" id="stepSurface"></div>
</section>

</main>
<script>
// ---- helpers ----
function clamp(v,lo,hi){v=parseFloat(v);return Math.max(lo,Math.min(hi,isNaN(v)?lo:v));}
function bytes16(v){const n=Math.round(clamp(v,0,65535));return{coarse:(n>>8)&255,fine:n&255};}
function absolute(start,rel){return start+rel-1;}
function uid(){return Date.now()+Math.floor(Math.random()*1000);}
function setStatus(t,bad=false){const el=document.getElementById('status');el.textContent=t;el.className=bad?'status bad':'status';}
function hex2(n){return clamp(n,0,255).toString(16).padStart(2,'0');}
function rgbHex(v){return '#'+hex2(v.a)+hex2(v.b)+hex2(v.c);}
function cmyHex(v){return '#'+hex2(255-v.a)+hex2(255-v.b)+hex2(255-v.c);}
function cmykHex(v){return '#'+hex2(Math.round(255*(1-v.a/255)*(1-v.k/255)))+hex2(Math.round(255*(1-v.b/255)*(1-v.k/255)))+hex2(Math.round(255*(1-v.c/255)*(1-v.k/255)));}
function hexToRgb(hex){const m=(hex||'#000000').match(/^#?([0-9a-f]{6})$/i);const n=parseInt(m?m[1]:'000000',16);return{a:(n>>16)&255,b:(n>>8)&255,c:n&255};}
function rgbToCmy(hex){const r=hexToRgb(hex);return{a:255-r.a,b:255-r.b,c:255-r.c};}
function rgbToCmyk(hex){const r=hexToRgb(hex);const rv=r.a/255,g=r.b/255,b=r.c/255;const k=1-Math.max(rv,g,b);if(k>=1)return{a:0,b:0,c:0,k:255};return{a:Math.round((1-rv-k)/(1-k)*255),b:Math.round((1-g-k)/(1-k)*255),c:Math.round((1-b-k)/(1-k)*255),k:Math.round(k*255)};}
function lerp(a,b,t){return a+(b-a)*t;}
function interpolateValue(from,to,t){
  if(t<=0)return from;if(t>=1)return to;
  if(typeof to==='number')return lerp(typeof from==='number'?from:0,to,t);
  if(typeof to==='object'&&to!==null){const r={};Object.keys(to).forEach(k=>{r[k]=lerp((from??{})[k]??0,to[k],t);});return r;}
  return t<0.5?from:to;
}

// ---- DMX send ----
const baseUrlEl=document.getElementById('baseUrl');
function sendChannel(ch,value){
  const root=baseUrlEl.value.replace(/\/+$/,'');
  if(!root)return;
  const url=root+'/dmx/set/'+Math.round(ch)+'/'+Math.round(clamp(value,0,255));
  if(root!==location.origin){new Image().src=url+'?t='+Date.now();return;}
  fetch(url,{cache:'no-store'}).catch(()=>{});
}
function defaultValue(c){
  if(c.type==='panTilt16')return{pan:32768,tilt:32768};
  if(c.type==='panTilt8')return{pan:128,tilt:128};
  if(c.type==='cmyk')return{a:0,b:0,c:0,k:0};
  if(c.type==='rgbw')return{a:0,b:0,c:0,w:0};
  if(c.type==='rgbwa')return{a:0,b:0,c:0,w:0,amber:0};
  if(c.type==='rgb'||c.type==='cmy')return{a:0,b:0,c:0};
  return 0;
}
function sendControlValue(f,c,val){
  val=val??defaultValue(c);
  if(c.type==='panTilt16'){
    const pan=bytes16(val.pan??32768),tilt=bytes16(val.tilt??32768);
    sendChannel(absolute(f.start,c.pan),pan.coarse);
    sendChannel(absolute(f.start,c.panFine??c.pan+1),pan.fine);
    sendChannel(absolute(f.start,c.tilt),tilt.coarse);
    sendChannel(absolute(f.start,c.tiltFine??c.tilt+1),tilt.fine);
  }else if(c.type==='panTilt8'){
    sendChannel(absolute(f.start,c.pan),val.pan??128);
    sendChannel(absolute(f.start,c.tilt),val.tilt??128);
  }else if(['rgb','rgbw','rgbwa','cmy','cmyk'].includes(c.type)){
    const parts=c.type==='cmyk'?['a','b','c','k']:c.type==='rgbw'?['a','b','c','w']:c.type==='rgbwa'?['a','b','c','w','amber']:['a','b','c'];
    parts.forEach(p=>sendChannel(absolute(f.start,c[p]),val[p]??0));
  }else if(c.type==='slider16'){
    const b=bytes16(val??0);
    sendChannel(absolute(f.start,c.channel),b.coarse);
    sendChannel(absolute(f.start,c.fine??c.channel+1),b.fine);
  }else{
    sendChannel(absolute(f.start,c.channel),val??0);
  }
}

// ---- setup loading ----
let setup={};
let participating={};
function controlKey(f,c){return f.id+':'+c.id;}
function fixtureProfile(f){return(setup.profiles||[]).find(p=>p.id===f.profileId);}

async function loadSetup(){
  try{
    if(location.protocol==='http:'||location.protocol==='https:'){
      const r=await fetch('fixture_setup.php',{cache:'no-store'});
      const j=await r.json();
      if(r.ok&&j.ok&&j.exists){setup=j.setup;baseUrlEl.value=setup.baseUrl||'';rebuildParticipation();setStatus('Setup loaded from server');return;}
    }
  }catch(_){}
  try{
    const raw=localStorage.getItem('dmxFixtureController');
    if(raw){setup=JSON.parse(raw);baseUrlEl.value=setup.baseUrl||'';rebuildParticipation();setStatus('Setup loaded (browser cache)');return;}
  }catch(_){}
  setStatus('No setup found — open Fixture Controller first',true);
}

function rebuildParticipation(){
  const newP={};
  (setup.fixtures||[]).forEach(f=>{
    const p=fixtureProfile(f);if(!p)return;
    p.controls.forEach(c=>{const k=controlKey(f,c);newP[k]=participating[k]??true;});
  });
  participating=newP;
  drawParticipation();
}

function getParticipatingList(){
  const result=[];
  (setup.fixtures||[]).forEach(f=>{
    const p=fixtureProfile(f);if(!p)return;
    p.controls.forEach(c=>{if(participating[controlKey(f,c)])result.push({f,c});});
  });
  return result;
}

// ---- participation UI ----
function drawParticipation(){
  const el=document.getElementById('participationList');
  el.innerHTML='';
  (setup.fixtures||[]).forEach(f=>{
    const p=fixtureProfile(f);if(!p)return;
    const item=document.createElement('div');item.className='item';
    item.innerHTML=`<div class="small" style="font-weight:700;color:var(--text)">${f.name} <span style="font-weight:400;color:var(--muted)">${p.name} · start ch ${f.start}</span></div>`;
    p.controls.forEach(c=>{
      const k=controlKey(f,c);
      const lbl=document.createElement('label');
      lbl.style.cssText='flex-direction:row;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer';
      lbl.innerHTML=`<input type="checkbox" data-key="${k}" ${participating[k]?'checked':''} style="accent-color:var(--accent)"> ${c.label} <span style="opacity:.6">(${c.type})</span>`;
      item.appendChild(lbl);
    });
    el.appendChild(item);
  });
  el.oninput=e=>{
    if(e.target.dataset.key){participating[e.target.dataset.key]=e.target.checked;drawStepEditor();}
  };
}

// ---- steps ----
let steps=[];
let selectedStepIdx=-1;

function calcDefaultDuration(){
  const bpm=parseFloat(document.getElementById('bpmInput').value)||120;
  const beats=parseFloat(document.getElementById('beatsPerStep').value)||1;
  return Math.round(60000/bpm*beats);
}
function calcDefaultFade(){return parseInt(document.getElementById('globalFade').value)||0;}

function makeStep(label,vals){
  return{id:uid(),label:label||('Step '+(steps.length+1)),duration:calcDefaultDuration(),fade:calcDefaultFade(),values:vals||{}};
}
function addStep(vals){
  const s=makeStep(null,vals);
  steps.push(s);
  selectedStepIdx=steps.length-1;
  drawStepList();drawStepEditor();
  setStatus('Step '+(steps.length)+' added');
}
function duplicateStep(idx){
  const s=steps[idx];
  const copy={...s,id:uid(),label:s.label+' copy',values:{...s.values}};
  steps.splice(idx+1,0,copy);
  selectedStepIdx=idx+1;
  drawStepList();drawStepEditor();
}
function deleteStep(idx){
  steps.splice(idx,1);
  if(selectedStepIdx>=steps.length)selectedStepIdx=steps.length-1;
  if(activeStepIdx>=steps.length)activeStepIdx=steps.length-1;
  drawStepList();drawStepEditor();
}
function moveStep(idx,dir){
  const ni=idx+dir;
  if(ni<0||ni>=steps.length)return;
  [steps[idx],steps[ni]]=[steps[ni],steps[idx]];
  if(selectedStepIdx===idx)selectedStepIdx=ni;
  else if(selectedStepIdx===ni)selectedStepIdx=idx;
  if(activeStepIdx===idx)activeStepIdx=ni;
  else if(activeStepIdx===ni)activeStepIdx=idx;
  drawStepList();
}

function captureFromFC(stepIdx){
  const step=steps[stepIdx];if(!step)return;
  try{
    const raw=localStorage.getItem('dmxFixtureController');
    const data=raw?JSON.parse(raw):{};
    const vals=data.values||{};
    getParticipatingList().forEach(({f,c})=>{const k=controlKey(f,c);if(vals[k]!==undefined)step.values[k]=vals[k];});
    if(stepIdx===selectedStepIdx)drawStepEditor();
    setStatus('FC values captured into step '+(stepIdx+1));
  }catch(e){setStatus('Capture failed: '+e.message,true);}
}

// ---- step list UI ----
function drawStepList(){
  const el=document.getElementById('stepList');
  document.getElementById('stepCount').textContent=steps.length;
  el.innerHTML='';
  steps.forEach((s,i)=>{
    const isActive=i===activeStepIdx;
    const isSel=i===selectedStepIdx;
    const item=document.createElement('div');
    item.className='item'+(isActive?' active-step':'')+(isSel?' edit-step':'');
    item.innerHTML=`
      <div class="row" style="flex-wrap:nowrap;overflow:hidden">
        <span class="step-num${isActive?' playing':''}">${i+1}</span>
        <span style="flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:${isSel?'var(--warn)':'var(--text)'}">${s.label}</span>
        <span class="small" style="white-space:nowrap;flex-shrink:0">${s.duration}ms · fade ${s.fade??0}%</span>
        <div class="buttons" style="flex-shrink:0;gap:4px">
          <button data-sel="${i}" style="padding:5px 9px;font-size:12px">Edit</button>
          <button data-dup="${i}" style="padding:5px 9px;font-size:12px">Dupe</button>
          <button data-up="${i}" style="padding:5px 7px;font-size:12px">↑</button>
          <button data-dn="${i}" style="padding:5px 7px;font-size:12px">↓</button>
          <button class="warn" data-del="${i}" style="padding:5px 9px;font-size:12px">✕</button>
        </div>
      </div>`;
    el.appendChild(item);
  });
  el.onclick=e=>{
    const s=e.target.dataset.sel,d=e.target.dataset.dup,x=e.target.dataset.del,u=e.target.dataset.up,dn=e.target.dataset.dn;
    if(s!==undefined){selectedStepIdx=parseInt(s);drawStepList();drawStepEditor();}
    else if(d!==undefined)duplicateStep(parseInt(d));
    else if(x!==undefined)deleteStep(parseInt(x));
    else if(u!==undefined)moveStep(parseInt(u),-1);
    else if(dn!==undefined)moveStep(parseInt(dn),1);
  };
}

// ---- step editor ----
function getStepVal(f,c){return steps[selectedStepIdx]?.values?.[controlKey(f,c)];}
function setStepVal(f,c,val){
  const s=steps[selectedStepIdx];if(!s)return;
  s.values[controlKey(f,c)]=val;
  if(document.getElementById('livePreview').checked)sendControlValue(f,c,val);
}

function drawStepEditor(){
  const hint=document.getElementById('editorHint');
  const surface=document.getElementById('stepSurface');
  const title=document.getElementById('editorTitle');
  const step=steps[selectedStepIdx];
  if(!step){surface.innerHTML='';hint.style.display='block';title.textContent='';return;}
  hint.style.display='none';
  title.textContent='#'+(selectedStepIdx+1)+' – '+step.label;
  document.getElementById('edLabel').value=step.label;
  document.getElementById('edDuration').value=step.duration;
  document.getElementById('edFade').value=step.fade;
  surface.innerHTML='';
  const ptList=getParticipatingList();
  if(!ptList.length){surface.innerHTML='<div class="small">No controls selected in Participating Controls.</div>';return;}
  const byFixture=new Map();
  ptList.forEach(({f,c})=>{if(!byFixture.has(f.id))byFixture.set(f.id,{f,controls:[]});byFixture.get(f.id).controls.push(c);});
  byFixture.forEach(({f,controls})=>{
    const p=fixtureProfile(f);if(!p)return;
    const card=document.createElement('article');card.className='card';
    card.innerHTML=`<div class="control-head"><h2>${f.name}</h2><span class="small">${p.name} · ${p.mode} · start ${f.start}</span></div>${controls.map(c=>renderStepControl(f,c)).join('')}`;
    surface.appendChild(card);
  });
  // attach XY pad pointer events
  surface.querySelectorAll('[data-xyf]').forEach(pad=>{
    pad.addEventListener('pointerdown',e=>{pad.setPointerCapture(e.pointerId);handleXY(e,pad);});
    pad.addEventListener('pointermove',e=>{if(pad.hasPointerCapture(e.pointerId))handleXY(e,pad);});
  });
  surface.oninput=handleStepInput;
  surface.onclick=handleStepClick;
}

function handleXY(e,pad){
  const fi=parseInt(pad.dataset.xyf),ci=parseInt(pad.dataset.xyc);
  const f=setup.fixtures?.find(x=>x.id===fi);
  const p=f&&fixtureProfile(f);const c=p?.controls.find(x=>x.id===ci);
  if(!f||!c)return;
  const r=pad.getBoundingClientRect();
  const x=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  const y=Math.max(0,Math.min(1,(e.clientY-r.top)/r.height));
  const max=c.type==='panTilt8'?255:65535;
  setStepVal(f,c,{pan:Math.round(x*max),tilt:Math.round((1-y)*max)});
  updateStepDisplay(f,c);
}

function handleStepInput(e){
  const fi=parseInt(e.target.dataset.fi),ci=parseInt(e.target.dataset.ci);
  if(isNaN(fi)||isNaN(ci))return;
  const f=setup.fixtures?.find(x=>x.id===fi);
  const p=f&&fixtureProfile(f);const c=p?.controls.find(x=>x.id===ci);
  if(!f||!c)return;
  if(e.target.dataset.colorPicker){
    const cur={...(getStepVal(f,c)||defaultValue(c))};
    if(c.type==='rgb'||c.type==='rgbw'||c.type==='rgbwa'){const rgb=hexToRgb(e.target.value);setStepVal(f,c,{...cur,a:rgb.a,b:rgb.b,c:rgb.c});}
    else if(c.type==='cmy')setStepVal(f,c,rgbToCmy(e.target.value));
    else if(c.type==='cmyk')setStepVal(f,c,rgbToCmyk(e.target.value));
  }else if(e.target.dataset.axis){
    const v={...(getStepVal(f,c)||defaultValue(c))};
    v[e.target.dataset.axis]=clamp(e.target.value,0,c.type==='panTilt8'?255:65535);
    setStepVal(f,c,v);
  }else if(e.target.dataset.byteAxis){
    const v={...(getStepVal(f,c)||defaultValue(c))};
    const b=bytes16(v[e.target.dataset.byteAxis]??0);
    b[e.target.dataset.bp]=clamp(e.target.value,0,255);
    v[e.target.dataset.byteAxis]=(b.coarse<<8)|b.fine;
    setStepVal(f,c,v);
  }else if(e.target.dataset.bytePart){
    const b=bytes16(getStepVal(f,c)??0);
    b[e.target.dataset.bytePart]=clamp(e.target.value,0,255);
    setStepVal(f,c,(b.coarse<<8)|b.fine);
  }else if(e.target.dataset.part){
    const v={...(getStepVal(f,c)||defaultValue(c))};
    v[e.target.dataset.part]=clamp(e.target.value,0,255);
    setStepVal(f,c,v);
  }else{
    setStepVal(f,c,clamp(e.target.value,0,c.type==='slider16'?65535:255));
  }
  updateStepDisplay(f,c);
}

function handleStepClick(e){
  const fi=parseInt(e.target.dataset.fi),ci=parseInt(e.target.dataset.ci);
  if(isNaN(fi)||isNaN(ci))return;
  const f=setup.fixtures?.find(x=>x.id===fi);
  const p=f&&fixtureProfile(f);const c=p?.controls.find(x=>x.id===ci);
  if(!f||!c)return;
  if(e.target.dataset.center){setStepVal(f,c,c.type==='panTilt8'?{pan:128,tilt:128}:{pan:32768,tilt:32768});updateStepDisplay(f,c);return;}
  if(e.target.dataset.color){
    const cur={...(getStepVal(f,c)||defaultValue(c))};
    if(c.type==='rgb'||c.type==='rgbw'||c.type==='rgbwa'){const rgb=hexToRgb(e.target.dataset.color);setStepVal(f,c,{...cur,a:rgb.a,b:rgb.b,c:rgb.c});}
    else if(c.type==='cmy')setStepVal(f,c,rgbToCmy(e.target.dataset.color));
    else if(c.type==='cmyk')setStepVal(f,c,rgbToCmyk(e.target.dataset.color));
    updateStepDisplay(f,c);return;
  }
  if(e.target.dataset.wheel!==undefined){setStepVal(f,c,clamp(e.target.dataset.wheel,0,255));updateStepDisplay(f,c);return;}
}

function updateStepDisplay(f,c){
  const fi=f.id,ci=c.id;
  const v=getStepVal(f,c)??defaultValue(c);
  if(c.type==='panTilt16'||c.type==='panTilt8'){
    const max=c.type==='panTilt8'?255:65535;
    const pad=document.querySelector(`[data-xyf="${fi}"][data-xyc="${ci}"]`);
    const dot=pad?.querySelector('.xy-dot');
    if(dot){dot.style.left=((v.pan??0)/max*100)+'%';dot.style.top=(100-(v.tilt??0)/max*100)+'%';}
    document.querySelectorAll(`[data-readoutf="${fi}"][data-readoutc="${ci}"]`).forEach(el=>el.textContent='Pan '+Math.round(v.pan??0)+' · Tilt '+Math.round(v.tilt??0));
    ['pan','tilt'].forEach(ax=>{
      document.querySelectorAll(`input[data-fi="${fi}"][data-ci="${ci}"][data-axis="${ax}"]`).forEach(el=>{if(el.value!=v[ax])el.value=Math.round(v[ax]??0);});
      if(c.type==='panTilt16'){
        const b=bytes16(v[ax]??0);
        document.querySelectorAll(`input[data-fi="${fi}"][data-ci="${ci}"][data-byte-axis="${ax}"][data-bp="coarse"]`).forEach(el=>{if(el.value!=b.coarse)el.value=b.coarse;});
        document.querySelectorAll(`input[data-fi="${fi}"][data-ci="${ci}"][data-byte-axis="${ax}"][data-bp="fine"]`).forEach(el=>{if(el.value!=b.fine)el.value=b.fine;});
        document.querySelectorAll(`[data-fi="${fi}"][data-ci="${ci}"][data-bro="${ax}Coarse"]`).forEach(el=>el.textContent=b.coarse);
        document.querySelectorAll(`[data-fi="${fi}"][data-ci="${ci}"][data-bro="${ax}Fine"]`).forEach(el=>el.textContent=b.fine);
      }
    });
    return;
  }
  if(['rgb','rgbw','rgbwa','cmy','cmyk'].includes(c.type)){
    const parts=c.type==='cmyk'?['a','b','c','k']:c.type==='rgbw'?['a','b','c','w']:c.type==='rgbwa'?['a','b','c','w','amber']:['a','b','c'];
    parts.forEach(pt=>{
      document.querySelectorAll(`[data-fi="${fi}"][data-ci="${ci}"][data-cv="${pt}"]`).forEach(el=>el.textContent=Math.round(v[pt]??0));
      document.querySelectorAll(`input[data-fi="${fi}"][data-ci="${ci}"][data-part="${pt}"]`).forEach(el=>{if(el.value!=v[pt])el.value=Math.round(v[pt]??0);});
    });
    const color=(c.type==='rgb'||c.type==='rgbw'||c.type==='rgbwa')?rgbHex(v):(c.type==='cmy'?cmyHex(v):cmykHex(v));
    document.querySelectorAll(`input[data-fi="${fi}"][data-ci="${ci}"][data-color-picker]`).forEach(el=>{if(el.value!==color)el.value=color;});
    return;
  }
  const sv=v??0;
  document.querySelectorAll(`input[data-fi="${fi}"][data-ci="${ci}"]:not([data-part])`).forEach(el=>{if(el.value!=sv)el.value=Math.round(sv);});
  document.querySelectorAll(`[data-readoutf="${fi}"][data-readoutc="${ci}"]`).forEach(el=>{el.textContent=c.type==='wheel'?'CH '+absolute(f.start,c.channel)+' · '+Math.round(sv):Math.round(sv);});
  if(c.type==='slider16'){
    const b=bytes16(sv);
    document.querySelectorAll(`input[data-fi="${fi}"][data-ci="${ci}"][data-byte-part="coarse"]`).forEach(el=>{if(el.value!=b.coarse)el.value=b.coarse;});
    document.querySelectorAll(`input[data-fi="${fi}"][data-ci="${ci}"][data-byte-part="fine"]`).forEach(el=>{if(el.value!=b.fine)el.value=b.fine;});
    document.querySelectorAll(`[data-fi="${fi}"][data-ci="${ci}"][data-bro="coarse"]`).forEach(el=>el.textContent=b.coarse);
    document.querySelectorAll(`[data-fi="${fi}"][data-ci="${ci}"][data-bro="fine"]`).forEach(el=>el.textContent=b.fine);
  }
}

function renderStepControl(f,c){
  const fi=f.id,ci=c.id;
  const v=getStepVal(f,c)??defaultValue(c);
  if(c.type==='panTilt16'){
    const pan=bytes16(v.pan??32768),tilt=bytes16(v.tilt??32768);
    return `<div class="control"><div class="control-head"><h3>${c.label}</h3><span class="bytes">Pan ${absolute(f.start,c.pan)}/${absolute(f.start,c.panFine??c.pan+1)} · Tilt ${absolute(f.start,c.tilt)}/${absolute(f.start,c.tiltFine??c.tilt+1)}</span></div>
      <div class="xy-pad" data-xyf="${fi}" data-xyc="${ci}"><div class="xy-dot" style="left:${(v.pan??32768)/65535*100}%;top:${100-(v.tilt??32768)/65535*100}%"></div></div>
      <div class="row"><span class="readout" data-readoutf="${fi}" data-readoutc="${ci}">Pan ${Math.round(v.pan??32768)} · Tilt ${Math.round(v.tilt??32768)}</span><button data-center="1" data-fi="${fi}" data-ci="${ci}">Center</button></div>
      <label>Pan<input type="range" min="0" max="65535" value="${Math.round(v.pan??32768)}" data-fi="${fi}" data-ci="${ci}" data-axis="pan"></label>
      <label>Tilt<input type="range" min="0" max="65535" value="${Math.round(v.tilt??32768)}" data-fi="${fi}" data-ci="${ci}" data-axis="tilt"></label>
      <div class="byte-sliders">
        <label>Pan coarse <span data-fi="${fi}" data-ci="${ci}" data-bro="panCoarse">${pan.coarse}</span><input type="range" min="0" max="255" value="${pan.coarse}" data-fi="${fi}" data-ci="${ci}" data-byte-axis="pan" data-bp="coarse"></label>
        <label>Pan fine <span data-fi="${fi}" data-ci="${ci}" data-bro="panFine">${pan.fine}</span><input type="range" min="0" max="255" value="${pan.fine}" data-fi="${fi}" data-ci="${ci}" data-byte-axis="pan" data-bp="fine"></label>
        <label>Tilt coarse <span data-fi="${fi}" data-ci="${ci}" data-bro="tiltCoarse">${tilt.coarse}</span><input type="range" min="0" max="255" value="${tilt.coarse}" data-fi="${fi}" data-ci="${ci}" data-byte-axis="tilt" data-bp="coarse"></label>
        <label>Tilt fine <span data-fi="${fi}" data-ci="${ci}" data-bro="tiltFine">${tilt.fine}</span><input type="range" min="0" max="255" value="${tilt.fine}" data-fi="${fi}" data-ci="${ci}" data-byte-axis="tilt" data-bp="fine"></label>
      </div></div>`;
  }
  if(c.type==='panTilt8'){
    return `<div class="control"><div class="control-head"><h3>${c.label}</h3><span class="bytes">Pan ${absolute(f.start,c.pan)} · Tilt ${absolute(f.start,c.tilt)}</span></div>
      <div class="xy-pad" data-xyf="${fi}" data-xyc="${ci}"><div class="xy-dot" style="left:${(v.pan??128)/255*100}%;top:${100-(v.tilt??128)/255*100}%"></div></div>
      <div class="row"><span class="readout" data-readoutf="${fi}" data-readoutc="${ci}">Pan ${Math.round(v.pan??128)} · Tilt ${Math.round(v.tilt??128)}</span><button data-center="1" data-fi="${fi}" data-ci="${ci}">Center</button></div>
      <label>Pan<input type="range" min="0" max="255" value="${Math.round(v.pan??128)}" data-fi="${fi}" data-ci="${ci}" data-axis="pan"></label>
      <label>Tilt<input type="range" min="0" max="255" value="${Math.round(v.tilt??128)}" data-fi="${fi}" data-ci="${ci}" data-axis="tilt"></label></div>`;
  }
  if(['rgb','rgbw','rgbwa','cmy','cmyk'].includes(c.type)){
    const names=(c.type==='rgb'||c.type==='rgbw'||c.type==='rgbwa')?['Red','Green','Blue','White','Amber']:c.type==='cmy'?['Cyan','Magenta','Yellow']:['Cyan','Magenta','Yellow','Key'];
    const parts=c.type==='cmyk'?['a','b','c','k']:c.type==='rgbw'?['a','b','c','w']:c.type==='rgbwa'?['a','b','c','w','amber']:['a','b','c'];
    const color=(c.type==='rgb'||c.type==='rgbw'||c.type==='rgbwa')?rgbHex(v):(c.type==='cmy'?cmyHex(v):cmykHex(v));
    return `<div class="control"><div class="control-head"><h3>${c.label}</h3><span class="bytes">CH ${parts.map(p=>absolute(f.start,c[p])).join('/')}</span></div>
      <label>Color<input type="color" value="${color}" data-fi="${fi}" data-ci="${ci}" data-color-picker="1"></label>
      ${parts.map((pt,i)=>`<label>${names[i]} <span data-fi="${fi}" data-ci="${ci}" data-cv="${pt}">${Math.round(v[pt]??0)}</span><input type="range" min="0" max="255" value="${Math.round(v[pt]??0)}" data-fi="${fi}" data-ci="${ci}" data-part="${pt}"></label>`).join('')}
      <div class="swatches"><button class="swatch" style="background:#fff" data-color="#ffffff" data-fi="${fi}" data-ci="${ci}"></button><button class="swatch" style="background:#f00" data-color="#ff0000" data-fi="${fi}" data-ci="${ci}"></button><button class="swatch" style="background:#0f0" data-color="#00ff00" data-fi="${fi}" data-ci="${ci}"></button><button class="swatch" style="background:#00f" data-color="#0000ff" data-fi="${fi}" data-ci="${ci}"></button></div></div>`;
  }
  if(c.type==='wheel'){
    const wv=v??0;
    const icon=o=>o.image?`<span class="option-icon" style="background-image:url('${o.image}')"></span>`:(o.color?`<span class="option-icon" style="background:${o.color}"></span>`:'');
    return `<div class="control"><div class="control-head"><h3>${c.label}</h3><span class="bytes" data-readoutf="${fi}" data-readoutc="${ci}">CH ${absolute(f.start,c.channel)} · ${wv}</span></div>
      <div class="tabs">${(c.options||[]).map(o=>`<button class="tab${o.value===wv?' active':''}" data-wheel="${o.value}" data-fi="${fi}" data-ci="${ci}">${icon(o)}${o.name}</button>`).join('')}</div>
      <input type="range" min="0" max="255" value="${wv}" data-fi="${fi}" data-ci="${ci}"></div>`;
  }
  // slider8 / slider16
  const max=c.type==='slider16'?65535:255;
  const sv=v??0;
  const b16=bytes16(sv);
  const chText=c.type==='slider16'?absolute(f.start,c.channel)+'/'+absolute(f.start,c.fine??c.channel+1):absolute(f.start,c.channel);
  const extra=c.type==='slider16'?`<div class="byte-sliders">
    <label>Coarse <span data-fi="${fi}" data-ci="${ci}" data-bro="coarse">${b16.coarse}</span><input type="range" min="0" max="255" value="${b16.coarse}" data-fi="${fi}" data-ci="${ci}" data-byte-part="coarse"></label>
    <label>Fine <span data-fi="${fi}" data-ci="${ci}" data-bro="fine">${b16.fine}</span><input type="range" min="0" max="255" value="${b16.fine}" data-fi="${fi}" data-ci="${ci}" data-byte-part="fine"></label>
    </div>`:'';
  return `<div class="control"><div class="control-head"><h3>${c.label}</h3><span class="readout" data-readoutf="${fi}" data-readoutc="${ci}">${sv}</span><span class="bytes">CH ${chText}</span></div>
    <input type="range" min="0" max="${max}" value="${sv}" data-fi="${fi}" data-ci="${ci}">${extra}</div>`;
}

// ---- playback ----
let playing=false;
let activeStepIdx=-1;
let playIntervalId=null;
let stepEnteredAt=null;
let prevOutput={};
let currentOutput={};

function startPlayback(){
  if(!steps.length){setStatus('Add some steps first',true);return;}
  if(!baseUrlEl.value.trim()){setStatus('Set Pico base URL first',true);return;}
  playing=true;
  activeStepIdx=0;
  stepEnteredAt=performance.now();
  prevOutput={};currentOutput={};
  document.getElementById('btnPlay').textContent='⏸ Pause';
  document.getElementById('btnStop').disabled=false;
  const hz=clamp(document.getElementById('updateRate').value,5,50);
  playIntervalId=setInterval(playbackTick,1000/hz);
  setStatus('Playing…');
  drawStepList();
}
function pausePlayback(){
  playing=false;clearInterval(playIntervalId);
  document.getElementById('btnPlay').textContent='▶ Resume';
  setStatus('Paused at step '+(activeStepIdx+1)+' – '+steps[activeStepIdx]?.label);
}
function resumePlayback(){
  playing=true;
  stepEnteredAt=performance.now();
  document.getElementById('btnPlay').textContent='⏸ Pause';
  document.getElementById('btnStop').disabled=false;
  const hz=clamp(document.getElementById('updateRate').value,5,50);
  playIntervalId=setInterval(playbackTick,1000/hz);
  setStatus('Playing…');
}
function stopPlayback(){
  playing=false;clearInterval(playIntervalId);
  activeStepIdx=-1;
  document.getElementById('btnPlay').textContent='▶ Play';
  document.getElementById('btnStop').disabled=true;
  document.getElementById('stepProgress').style.width='0%';
  document.getElementById('playbackInfo').textContent='Stopped';
  setStatus('Stopped');
  drawStepList();
}

function playbackTick(){
  if(!steps.length){stopPlayback();return;}
  const now=performance.now();
  const step=steps[activeStepIdx];if(!step){stopPlayback();return;}
  const durMs=Math.max(1,step.duration??500);
  const fadeMs=Math.round((clamp(step.fade??0,0,100)/100)*durMs);
  const elapsed=now-stepEnteredAt;
  const t=fadeMs>0?Math.min(1,elapsed/fadeMs):1;
  const ptList=getParticipatingList();
  ptList.forEach(({f,c})=>{
    const k=controlKey(f,c);
    const toVal=step.values[k]??defaultValue(c);
    const fromVal=prevOutput[k]??defaultValue(c);
    const val=t>=1?toVal:interpolateValue(fromVal,toVal,t);
    currentOutput[k]=val;
    sendControlValue(f,c,val);
  });
  const progress=Math.min(100,elapsed/durMs*100);
  document.getElementById('stepProgress').style.width=progress+'%';
  const remaining=Math.max(0,Math.round(durMs-elapsed));
  document.getElementById('playbackInfo').textContent=`Step ${activeStepIdx+1}/${steps.length} · ${step.label} · ${remaining}ms`;
  if(elapsed>=durMs)advanceStep();
}

function advanceStep(){
  const ptList=getParticipatingList();
  ptList.forEach(({f,c})=>{const k=controlKey(f,c);prevOutput[k]=steps[activeStepIdx].values[k]??defaultValue(c);});
  let next=activeStepIdx+1;
  if(next>=steps.length){
    if(document.getElementById('loopCheck').checked)next=0;
    else{stopPlayback();return;}
  }
  activeStepIdx=next;
  stepEnteredAt=performance.now();
  drawStepList();
}

function manualStep(dir){
  if(!steps.length)return;
  const ptList=getParticipatingList();
  ptList.forEach(({f,c})=>{const k=controlKey(f,c);prevOutput[k]=currentOutput[k]??steps[Math.max(0,activeStepIdx)]?.values[k]??defaultValue(c);});
  if(activeStepIdx<0){
    activeStepIdx=dir>0?0:steps.length-1;
  }else{
    let next=activeStepIdx+dir;
    if(next>=steps.length)next=document.getElementById('loopCheck').checked?0:steps.length-1;
    if(next<0)next=document.getElementById('loopCheck').checked?steps.length-1:0;
    activeStepIdx=next;
  }
  stepEnteredAt=performance.now();
  if(!playing){
    const step=steps[activeStepIdx];
    ptList.forEach(({f,c})=>sendControlValue(f,c,step.values[controlKey(f,c)]??defaultValue(c)));
    setStatus('Step '+(activeStepIdx+1)+': '+step.label);
    document.getElementById('btnStop').disabled=false;
  }
  drawStepList();
}

// ---- tap tempo ----
const tapTimes=[];
document.getElementById('btnTap').onclick=()=>{
  const now=performance.now();tapTimes.push(now);
  if(tapTimes.length>8)tapTimes.shift();
  if(tapTimes.length>=2){
    const avg=(tapTimes[tapTimes.length-1]-tapTimes[0])/(tapTimes.length-1);
    const bpm=Math.round(Math.min(600,Math.max(1,60000/avg)));
    document.getElementById('bpmInput').value=bpm;
    applyBpmToSteps();
    setStatus('Tap BPM: '+bpm);
  }
};

// ---- save / load chaser ----
function chaserData(){return{steps,participating};}
function applyChaserData(data){
  if(Array.isArray(data?.steps))steps=data.steps;
  if(data?.participating)Object.assign(participating,data.participating);
  selectedStepIdx=steps.length?0:-1;
  drawParticipation();drawStepList();drawStepEditor();
}
document.getElementById('btnSave').onclick=()=>{localStorage.setItem('dmxChaser',JSON.stringify(chaserData()));setStatus('Chaser saved');};
document.getElementById('btnLoad').onclick=()=>{
  const raw=localStorage.getItem('dmxChaser');
  if(raw){applyChaserData(JSON.parse(raw));setStatus('Chaser loaded');}
  else setStatus('No saved chaser found',true);
};
document.getElementById('btnExport').onclick=()=>{
  const blob=new Blob([JSON.stringify(chaserData(),null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='dmx_chaser.json';a.click();URL.revokeObjectURL(a.href);
  setStatus('dmx_chaser.json downloaded');
};
document.getElementById('btnImport').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange=e=>{
  const file=e.target.files?.[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{try{applyChaserData(JSON.parse(reader.result));setStatus('Chaser imported from '+file.name);}catch(err){alert('Invalid JSON: '+err.message);}e.target.value='';};
  reader.readAsText(file);
};

// ---- event wiring ----
document.getElementById('btnPlay').onclick=()=>{
  if(playing)pausePlayback();
  else if(activeStepIdx>=0)resumePlayback();
  else startPlayback();
};
document.getElementById('btnStop').onclick=stopPlayback;
function applyBpmToSteps(){const d=calcDefaultDuration();steps.forEach(s=>s.duration=d);drawStepList();}
document.getElementById('bpmInput').oninput=applyBpmToSteps;
document.getElementById('beatsPerStep').onchange=applyBpmToSteps;
document.getElementById('btnApplyFade').onclick=()=>{const f=clamp(document.getElementById('globalFade').value,0,100);steps.forEach(s=>s.fade=f);drawStepList();setStatus('Fade '+f+'% applied to all steps');};
document.getElementById('btnPrev').onclick=()=>manualStep(-1);
document.getElementById('btnNext').onclick=()=>manualStep(1);
document.getElementById('btnAddStep').onclick=()=>addStep();
document.getElementById('btnCaptureNew').onclick=()=>{
  const s=makeStep();steps.push(s);selectedStepIdx=steps.length-1;
  captureFromFC(selectedStepIdx);drawStepList();drawStepEditor();
};
document.getElementById('btnCaptureToStep').onclick=()=>captureFromFC(selectedStepIdx);
document.getElementById('btnClearAll').onclick=()=>{
  if(!confirm('Delete all steps?'))return;
  steps=[];selectedStepIdx=-1;stopPlayback();drawStepList();drawStepEditor();
};
document.getElementById('btnApplyMeta').onclick=()=>{
  const step=steps[selectedStepIdx];if(!step)return;
  step.label=document.getElementById('edLabel').value||step.label;
  step.duration=parseInt(document.getElementById('edDuration').value)||500;
  step.fade=parseInt(document.getElementById('edFade').value)||0;
  drawStepList();
  document.getElementById('editorTitle').textContent='#'+(selectedStepIdx+1)+' – '+step.label;
  setStatus('Step meta updated');
};
document.getElementById('btnSelAll').onclick=()=>{Object.keys(participating).forEach(k=>participating[k]=true);drawParticipation();drawStepEditor();};
document.getElementById('btnSelNone').onclick=()=>{Object.keys(participating).forEach(k=>participating[k]=false);drawParticipation();drawStepEditor();};

// ---- init ----
loadSetup();
try{const raw=localStorage.getItem('dmxChaser');if(raw)applyChaserData(JSON.parse(raw));}catch(_){}
</script>
